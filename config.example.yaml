# ========================================
# TranslateGemma 翻譯服務設定檔範例
# ========================================
# 複製此檔案為 config.yaml 並根據需求調整

# 模型設定
model:
  # 模型選擇: "4b" | "12b"
  # 4B 適合記憶體有限環境，12B 提供更高翻譯品質
  name: "4b"
  
  # 模型存放路徑（相對於專案根目錄）
  base_path: "models"
  
  # 推論裝置: "auto" | "cpu" | "cuda" | "mps"
  # auto 會依序偵測: cuda → mps → cpu
  device: "auto"
  
  # 資料型別: "auto" | "bfloat16" | "float16" | "float32"
  # auto 會依裝置自動選擇: CUDA/MPS → bfloat16, CPU → float32
  dtype: "auto"

# 伺服器設定
server:
  # 監聽位址
  # 0.0.0.0 允許外部存取，127.0.0.1 僅允許本機
  host: "0.0.0.0"
  
  # 監聽埠號
  port: 8000

# 翻譯設定
translation:
  # 最大生成 token 數量
  max_new_tokens: 512
  
  # 翻譯逾時秒數
  timeout: 120
  
  # 輸入文字字數上限（Unicode code points）
  # 前端即時顯示字數提示，超過上限時停用送出按鈕；後端亦驗證並回傳 422
  max_input_length: 512

# 語言偵測設定
language_detection:
  # CJK 字元佔比門檻（0.0 ~ 1.0）
  # 輸入文字中 CJK 字元佔「CJK + 英文字母」的比例達到此值，即判定為中文（zh-TW）
  # 預設 0.2 表示：中文字元超過 20% 就視為中文來源
  # 調低此值 → 對中文更敏感（少量中文字也算中文）
  # 調高此值 → 需要更多中文字才算中文（適合中英高度混雜的場景）
  cjk_threshold: 0.2

# 術語對照表設定（可選）
# 定義特定詞彙的翻譯對應，翻譯時優先使用這些對應
glossary:
  # 啟用術語對照表功能
  enabled: true
  
  # 術語對照項目清單
  # 每個項目包含: source(原文), target(譯文), source_lang, target_lang, case_sensitive(是否區分大小寫)
  entries:
    # 範例：技術術語保持原文
    - source: "API"
      target: "API"
      source_lang: "en"
      target_lang: "zh-TW"
      case_sensitive: false
    
    # 範例：專有名詞指定翻譯
    - source: "machine learning"
      target: "機器學習"
      source_lang: "en"
      target_lang: "zh-TW"
      case_sensitive: false
    
    # 範例：雙向對照（中翻英）
    - source: "人工智慧"
      target: "Artificial Intelligence"
      source_lang: "zh-TW"
      target_lang: "en"
      case_sensitive: false
